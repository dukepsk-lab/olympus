# This is the synthetic-illustration template, kept at the original 6 symbols.
# The breadth-expanded 9-symbol universe (with AUDUSD/XAGUSD/USOIL) is a
# REAL-TAPE experiment and lives in config/csv.yaml -- synthetic versions of
