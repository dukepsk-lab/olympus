name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # MetaTrader5 is imported lazily and never exercised by tests, so the
          # core scientific stack is all CI needs.
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run test suite (CPCV no-leakage, no-mid-fill, ledger dedup, ...)
        run: pytest -q

      - name: Smoke-test the pipeline on synthetic data (must REJECT, must exit 0)
        run: |
          python scripts/run_research.py --config config/default.yaml --symbol XAUUSD
